              - heading "Real-Time Sign Language Recognition Research" [level=4] [ref=e223]: Real-Time Sign Language Recognition Research
              - paragraph [ref=e226]: A key focus of the provided documents is a scientific study on optimizing real-time sign language recognition (SLR) using the MediaPipe framework and Long Short-Term Memory (LSTM) neural networks. Conducted by researchers from FPT University in Viet Nam, this research introduces an innovative multi-modal methodology designed to address the intricate challenge of capturing dynamic and subtle gestures [1].
              - paragraph [ref=e228]: "The core of the methodology lies in extracting skeletal coordinate data using MediaPipe and training four independent LSTM streams to capture different spatial and temporal features:"
              - generic [ref=e231]:
                - strong [ref=e232]: Joint Model
                - text: ": Processes raw coordinate points of the joints. It is the best-performing individual stream, achieving an accuracy of 0.67 on the How2Sign dataset [1]."
              - generic [ref=e235]:
                - strong [ref=e236]: Bone Model
                - text: ": Uses vector representations based on the directional displacement and distance between adjacent joints, achieving an accuracy of 0.668 [1]."
              - generic [ref=e239]:
                - strong [ref=e240]: Joint Motion Model
                - text: ": Tracks the velocity and displacement of joints across consecutive frames using first-order forward differences, achieving an accuracy of 0.656 [1]."
              - generic [ref=e243]:
                - strong [ref=e244]: Bone Motion Model
                - text: ": Captures temporal changes in bone vectors across adjacent frames to isolate kinetic patterns, yielding an accuracy of 0.652 [1]."
              - paragraph [ref=e246]: Rather than relying on a single modality, the research utilizes a weighted late-fusion ensemble technique. This Multi-Modal approach combines the predictions from all four models, achieving a peak overall accuracy of 0.673 on the How2Sign dataset. This demonstrates that synthesizing diverse joint and bone dynamics significantly improves model robustness [1].
              - heading "Dataset Evaluation and Comparative Analysis" [level=4] [ref=e248]: Dataset Evaluation and Comparative Analysis
              - paragraph [ref=e251]: "The proposed system was evaluated on two major datasets:"
              - generic [ref=e254]:
                - strong [ref=e255]: How2Sign Dataset
                - text: ": A comprehensive continuous American Sign Language (ASL) dataset. The study utilized 35,191 green screen RGB clips, distributed into Training (88.45%), Validation (4.95%), and Testing (6.60%) subsets [1]."
              - generic [ref=e258]:
                - strong [ref=e259]: Indian Sign Language (ISL) Dataset
                - text: ": A static, image-based lexicon of letters (A to Z) and numbers (1 to 9), featuring 1,200 images per character [1]."
              - paragraph [ref=e261]: When benchmarked against the established Indian Sign Language Recognition (ISLR) model developed by Velmathi and Goyal (2023), the proposed Multi-Modal model demonstrated superior accuracy (0.858 compared to 0.855 for ISLR) and a higher F1-score (0.85 compared to 0.847) [1]. However, this improvement introduces a trade-off in latency, as the Multi-Modal model has an average execution time of 0.3 seconds, which is slower than the highly optimized ISLR model's 0.07 seconds. Despite this trade-off, the 0.3-second latency remains viable for real-time video processing [1]. The researchers aim to implement these advancements in their interactive application, FPTs2l, to assist individuals with speech and hearing impairments [1].
              - heading "Software Solutions for the AEC Industry" [level=4] [ref=e263]: Software Solutions for the AEC Industry
              - paragraph [ref=e266]: Separate from the sign language research, the documents also highlight the operations of the GSI Group. GSI Group is a technology brand that provides software tools, consultancy services, and specialized plugins for the Architecture, Engineering, and Construction (AEC) industry. Its primary mission is to facilitate digital transformation, efficiency, and sustainability by helping clients streamline and optimize building information modeling (BIM) design workflows [3]. The company maintains offices and supports projects across Singapore, Hong Kong, and Vietnam [3].

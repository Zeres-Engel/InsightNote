name: InsightNote CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  # 1. Frontend Check Job (Lint & Compilation)
  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Node Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run TypeScript Compiler Check & Build
        run: npm run build

  # 2. Backend Check Job (Python compile + full requirements lock validation)
  backend-check:
    name: Backend Compilation Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            ./backend/requirements-ci.txt
            ./backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install CI Dependencies (fast compile check)
        run: pip install -r requirements-ci.txt

      - name: Validate Syntax Compilation
        run: python -m compileall app/ server.py config.py

      - name: Validate Full Runtime Requirements Resolve
        run: pip install -r requirements.txt

  # 3. Docker Dry-Run Job (Verify Dockerfiles can compile successfully)
  docker-build-test:
    name: Docker In-flight Build Test
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: insightnote-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: insightnote-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
